services:
  - type: web
    name: event-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      apt-get install -y \
        libpango-1.0-0 libpangoft2-1.0-0 libcairo2 \
        libgdk-pixbuf2.0-0 libharfbuzz0b libffi-dev \
        shared-mime-info 2>/dev/null || true
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ── CRITICAL: DB path must match disk mountPath below ────
      # Option A (SQLite, default): uncomment this line
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/backend/data/events.db

      # Option B (PostgreSQL, recommended for reliability):
      # 1. Create a PostgreSQL database in Render dashboard
      # 2. Copy the "Internal Database URL" from the DB dashboard
      # 3. Replace the line above with:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: event-agent-db
      #     property: connectionString
      # 4. Also change the driver: postgresql+asyncpg://... (add asyncpg to requirements.txt)

      # ── Tells database.py where the disk is mounted ─────────
      - key: RENDER_DISK_PATH
        value: /opt/render/project/src/backend

      # ── LLM ──────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # ── Event APIs ───────────────────────────────────────────
      - key: TICKETMASTER_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: LUMA_API_KEY
        sync: false

      # ── Email ────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: reports@leadstrategus.com

      # ── CORS ─────────────────────────────────────────────────
      - key: FRONTEND_ORIGIN
        sync: false

      # ── Performance (free tier) ──────────────────────────────
      - key: ENABLE_SEMANTIC_SEARCH
        value: "false"
      - key: PRELOAD_INDEX_ON_STARTUP
        value: "false"
      - key: COSINE_WEIGHT
        value: "0.0"
      - key: RULE_WEIGHT
        value: "1.0"
      - key: SCRAPE_DELAY_SECONDS
        value: "2.5"
      - key: SCRAPE_TIMEOUT_SECONDS
        value: "15"
      - key: TOP_K_FOR_LLM
        value: "20"

    disk:
      name: events-db
      # ⚠️  This MUST match RENDER_DISK_PATH and the path in DATABASE_URL above
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  - type: web
    name: event-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO VERIFY THE DISK IS WORKING
# After deploying, call: GET /health
# You should see:
#   "database_url": "sqlite+aiosqlite:////opt/render/project/src/backend/data/..."
#   "render_env": true
#   "disk_path": "/opt/render/project/src/backend"
#   "total_events": 500+   ← after first full ingestion
#
# If total_events keeps resetting to ~53:
#   → The disk is NOT attached. Go to Render Dashboard → your service
#   → Disks tab → verify the disk shows as "Attached"
#   → If not attached, click "Add Disk", set mount path to /opt/render/project/src/backend
#
# RECOMMENDED: Switch to PostgreSQL for true persistence:
#   1. Render Dashboard → New → PostgreSQL (free tier)
#   2. Copy "Internal Database URL"
#   3. Set DATABASE_URL env var to: postgresql+asyncpg://[paste URL here]
#      (replace the "postgresql://" prefix with "postgresql+asyncpg://")
#   4. Add asyncpg to requirements.txt
#   5. No disk needed — PostgreSQL is always persistent
# ─────────────────────────────────────────────────────────────────────────────

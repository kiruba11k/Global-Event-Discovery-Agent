services:
  - type: web
    name: event-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TICKETMASTER_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: LUMA_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./events.db
    disk:
      name: events-db
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  - type: web
    name: event-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

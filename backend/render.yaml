# ─────────────────────────────────────────────────────────────────────
# RENDER.YAML — Event Intelligence Agent
# ─────────────────────────────────────────────────────────────────────
#
# ⚠️  IMPORTANT — PERSISTENT STORAGE ON FREE TIER
# ─────────────────────────────────────────────────
# Render free web services have NO persistent disk.
# The `disk:` block requires a paid plan ($7/mo Starter).
# SQLite on the ephemeral filesystem is wiped on every restart/spin-down.
#
# ✅  FREE SOLUTION: Neon PostgreSQL (https://neon.tech)
#     • Free forever, 0.5 GB, no 90-day expiry
#     • Takes ~2 minutes to set up
#
# SETUP STEPS:
#   1. Go to https://neon.tech and create a free account
#   2. Create a new project (one click, choose any region)
#   3. On the Dashboard, copy the "Connection string":
#        postgresql://user:pass@ep-xxx.region.aws.neon.tech/neondb?sslmode=require
#   4. In Render → your backend service → Environment → Add env var:
#        DATABASE_URL = <paste the Neon connection string here>
#   5. Click "Save Changes" → service redeploys automatically
#   6. Done. All scraped events now persist across restarts and spin-downs.
#
# The app auto-detects the driver (asyncpg for Postgres, aiosqlite for SQLite)
# and normalises the URL — no code changes needed.
# ─────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: event-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      apt-get install -y \
        libpango-1.0-0 \
        libpangoft2-1.0-0 \
        libcairo2 \
        libgdk-pixbuf2.0-0 \
        libharfbuzz0b \
        libffi-dev \
        shared-mime-info \
        2>/dev/null || true
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Database ─────────────────────────────────────────────────
      # Set this to your Neon / Supabase PostgreSQL connection string.
      # Example: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      # The code auto-converts postgres:// → postgresql+asyncpg:// and sslmode → ssl.
      # Leave as SQLite only for local testing (data won't persist on Render free tier).
      - key: DATABASE_URL
        sync: false   # ← set in Render dashboard, not here (keep secret)

      # ── LLM ──────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # ── Event APIs ────────────────────────────────────────────────
      - key: TICKETMASTER_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: LUMA_API_KEY
        sync: false

      # ── Email (Resend) ────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: reports@leadstrategus.com

      # ── Frontend / CORS ───────────────────────────────────────────
      - key: FRONTEND_ORIGIN
        sync: false

      # ── Embedding (disabled — exceeds 512 MB free tier RAM) ──────
      - key: ENABLE_SEMANTIC_SEARCH
        value: "false"
      - key: PRELOAD_INDEX_ON_STARTUP
        value: "false"

      # ── Scoring (rules-only on free tier) ─────────────────────────
      - key: COSINE_WEIGHT
        value: "0.0"
      - key: RULE_WEIGHT
        value: "1.0"

      # ── Scraper tuning ────────────────────────────────────────────
      - key: SCRAPE_DELAY_SECONDS
        value: "2.5"
      - key: SCRAPE_TIMEOUT_SECONDS
        value: "15"
      - key: TOP_K_FOR_LLM
        value: "20"

      # ── Seed protection ───────────────────────────────────────────
      - key: SEED_ADMIN_TOKEN
        sync: false

  - type: web
    name: event-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false

# ─────────────────────────────────────────────────────────────────────
# NOTE ON DISK — DO NOT ADD BACK FOR FREE TIER
# ─────────────────────────────────────────────────────────────────────
# The `disk:` block is intentionally removed.
# On free tier it either isn't attached or costs extra.
# Use Neon PostgreSQL (free) as described above — it's the right tool.
#
# If you upgrade to Render Starter ($7/mo), you can add back:
#   disk:
#     name: events-db
#     mountPath: /opt/render/project/src/backend
#     sizeGB: 1
# And switch DATABASE_URL back to: sqlite+aiosqlite:///./events.db
# ─────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────
# FREE-TIER DAILY SCRAPING STRATEGY
# ─────────────────────────────────────────────────────────────────────
# Render free tier spins down after 15 min of inactivity.
# APScheduler inside the app fires at 02:00 UTC IF the app is awake.
# To guarantee daily scraping even when idle, use ONE of:
#
# Option A — GitHub Actions (recommended, completely free):
#   .github/workflows/daily_refresh.yml
#   Set secret BACKEND_URL = https://your-app.onrender.com
#   Pings /health to wake service, then POST /api/refresh
#
# Option B — cron-job.org (free):
#   Add a job: GET https://your-app.onrender.com/health every 10 min
#   This keeps the service warm AND prevents spin-down
#   Add a separate job: POST /api/refresh daily at 02:05 UTC
# ─────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: event-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TICKETMASTER_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: LUMA_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: ENABLE_SEMANTIC_SEARCH
        value: "false"
      - key: PRELOAD_INDEX_ON_STARTUP
        value: "false"
      - key: COSINE_WEIGHT
        value: "0.0"
      - key: RULE_WEIGHT
        value: "1.0"
      - key: SCRAPE_DELAY_SECONDS
        value: "2.0"
      - key: SCRAPE_TIMEOUT_SECONDS
        value: "15"
      - key: TOP_K_FOR_LLM
        value: "20"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./events.db
    disk:
      name: events-db
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  - type: web
    name: event-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
